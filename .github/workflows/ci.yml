name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: go vet
        run: go vet neodlp/...

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install yt-dlp (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y yt-dlp

      - name: Install yt-dlp (macOS)
        if: runner.os == 'macOS'
        run: brew install yt-dlp

      - name: Install yt-dlp (Windows)
        if: runner.os == 'Windows'
        run: choco install yt-dlp

      - name: Run tests
        run: go test -v -count=1 -skip TestInfoRequiresYtDlp neodlp/...

  build:
    name: Build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build
        run: go build -ldflags="-X neodlp/internal/version.Commit=$(git rev-parse --short HEAD)" -o neodlp${{ runner.os == 'Windows' && '.exe' || '' }} .
